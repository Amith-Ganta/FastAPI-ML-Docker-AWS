name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-ml-docker-aws:latest .

    - name: Push to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-ml-docker-aws:latest

    - name: Setup SSH agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.AWS_KEY }}

    - name: Add EC2 host to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.AWS_IP }} >> ~/.ssh/known_hosts

    - name: Deploy to AWS
      run: |
        ssh ubuntu@${{ secrets.AWS_IP }} << 'EOF'
        set -e
        echo "🚀 Deploying to AWS..."

        # Install Docker if not present
        if ! command -v docker &> /dev/null; then
          sudo apt update
          sudo apt install -y docker.io
          sudo usermod -aG docker ubuntu
        fi

        # Login to Docker
        echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

        # Pull latest image
        docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-ml-docker-aws:latest

        # Stop and remove old containers (force remove all)
        docker rm -f fastapi-api 2>/dev/null || true
        docker rm -f streamlit-frontend 2>/dev/null || true
        docker ps -a
        echo "=== Checking port 8000 ==="
        sudo lsof -i :8000 || echo "Port 8000 is free"
        sleep 2

        # Run API container
        docker run -d \
          --name fastapi-api \
          -p 8000:8000 \
          --restart unless-stopped \
          ${{ secrets.DOCKER_USERNAME }}/fastapi-ml-docker-aws:latest

        # Wait for API to start
        sleep 3

        # Run Streamlit container with API URL
        docker run -d \
          --name streamlit-frontend \
          -p 8501:8501 \
          --restart unless-stopped \
          -e API_URL="http://localhost:8000/predict" \
          ${{ secrets.DOCKER_USERNAME }}/fastapi-ml-docker-aws:latest \
          streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0

        echo "✅ Deployment Complete!"
        echo "API URL: http://${{ secrets.AWS_IP }}:8000/docs"
        echo "Frontend URL: http://${{ secrets.AWS_IP }}:8501"
        EOF

    - name: Deployment Summary
      run: |
        echo "✅ Deployment Successful!"
        echo ""
        echo "🔗 Access your app:"
        echo "   Backend API:  http://${{ secrets.AWS_IP }}:8000/docs"
        echo "   Frontend:     http://${{ secrets.AWS_IP }}:8501"
        echo ""
        echo "⚠️  Make sure AWS Security Groups allow ports 8000 and 8501"
